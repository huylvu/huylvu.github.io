<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Thiên Bàn icon</title>
  <desc id="desc">A dark ink celestial chart with brass orbit rings, constellations, a red seal, and a vermilion star.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="44%" r="70%">
      <stop offset="0%" stop-color="#18302b"/>
      <stop offset="48%" stop-color="#071412"/>
      <stop offset="100%" stop-color="#020706"/>
    </radialGradient>
    <radialGradient id="wheelGlow" cx="50%" cy="50%" r="54%">
      <stop offset="0%" stop-color="#d5b76f" stop-opacity=".18"/>
      <stop offset="66%" stop-color="#c79a52" stop-opacity=".055"/>
      <stop offset="100%" stop-color="#c79a52" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="brass" x1="20%" y1="7%" x2="86%" y2="95%">
      <stop offset="0%" stop-color="#f1d79d"/>
      <stop offset="42%" stop-color="#a98242"/>
      <stop offset="100%" stop-color="#e0bd75"/>
    </linearGradient>
    <linearGradient id="sealRed" x1="20%" y1="10%" x2="82%" y2="92%">
